name: First workflow
on: push

jobs:
 my_job: 
  name: Greet
  runs-on: ubuntu-latest
  steps:
   - name: Checkout Code
     uses: actions/checkout@v4
   
   - name: Print Code
     run: echo "Hello from Github Action!"
   
   - name: Current Date and time
     run : date
  
   - name: Print Branch Name
     run: echo "Branch name is $GITHUB_REF_NAME"
   
   - name: List Files in Repository 
     run: ls -ls

   - name: Running wrong command
     run: chmd 400
   
   - name: Print Runner OS
     run: echo "Runner OS is $RUNNER_OS"

