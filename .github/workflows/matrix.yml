name: Matrix workflow
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyhton-version: ['3.10','3.11','3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Pyhton
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Python version
        run: python --version
        
