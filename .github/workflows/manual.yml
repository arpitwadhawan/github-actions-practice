name: Manual workflow
on:
 workflow_dispatch:
   inputs:
     environment:
       descritpion: "Select environment"
       required: true
       default: staging
       type: choice
       options:
         - staging
         - production

jobs:
 my_job:
   name: Enviornment selection job
   runs-on: ubuntu-latest
   
   steps:
    - name: Print selected environment
      run: echo "You selected environment: ${{ github.event.inputs.environment }}"
